# Finance Planner nginx config
# Add this block inside your existing nginx server {} block
# File: /etc/nginx/sites-enabled/advy  (or wherever your main config is)

# Frontend — static files
location /financeplaner/ {
    alias /opt/finance-planner/frontend/dist/;
    try_files $uri $uri/ /financeplaner/index.html;
}

# Backend API
location /financeplaner/api/ {
    proxy_pass http://127.0.0.1:8001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Allow large PDF uploads (up to 50MB)
    client_max_body_size 50M;
    proxy_read_timeout 120s;
}
